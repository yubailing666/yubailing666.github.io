<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>节拍游乐场</title>
<style>
*{margin:0;padding:0}
body{background:#1a1614;overflow:hidden;font-family:sans-serif}
#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;display:block;background:#1a1614}

/* Top bar */
#top{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;align-items:center;padding:14px 14px 40px;background:linear-gradient(rgba(26,22,20,.9),transparent)}
#info{font-size:12px;font-weight:600;color:#5a5048;letter-spacing:1.5px}
#info span{color:#ff8a6a}
#top-right{display:flex;gap:6px}
.tb{width:34px;height:34px;border-radius:10px;background:rgba(60,50,40,.5);border:none;color:#a0988a;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tb:active{background:rgba(255,138,106,.3)}

/* Bottom bar */
#bar{position:fixed;bottom:0;left:0;right:0;z-index:5;padding:30px 14px 20px;background:linear-gradient(transparent,rgba(26,22,20,.92) 20%);pointer-events:none}
#bar>*{pointer-events:auto}
#bar-inner{display:flex;align-items:center;justify-content:center;gap:10px}
#btn{width:52px;height:52px;border-radius:50%;border:none;font-size:20px;cursor:pointer;display:inline-block}
#btn.g{background:#ff8a6a;color:#fff;box-shadow:0 4px 16px rgba(255,138,106,.3)}
#btn.g:active{transform:scale(.9)}
#btn.s{background:#3a3028;color:#f0ece6}
#btn.s:active{transform:scale(.9)}
.bctrl{display:flex;align-items:center;gap:4px}
.bctrl .lbl{font-size:9px;font-weight:600;letter-spacing:1px;min-width:16px;text-align:center}
.bctrl .lbl.a{color:#ff8a6a}.bctrl .lbl.b{color:#6ab0c8}
.bctrl .b{width:28px;height:28px;border-radius:8px;border:1px solid #3a3028;background:transparent;color:#a0988a;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.bctrl .b:active{background:rgba(255,138,106,.3);border-color:#ff8a6a;color:#ff8a6a}
.bctrl .n{font-size:16px;font-weight:700;color:#f0ece6;min-width:18px;text-align:center;font-variant-numeric:tabular-nums}

/* Panel */
#panel{position:fixed;left:0;right:0;bottom:0;z-index:10;background:rgba(26,22,20,.95);border-radius:20px 20px 0 0;padding:16px 20px 24px;transform:translateY(100%);transition:transform .3s ease;max-height:60vh;overflow-y:auto}
#panel.open{transform:translateY(0)}
#panel-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
#panel-hd span{font-size:12px;font-weight:600;color:#5a5048;letter-spacing:1px}
.psec{margin-bottom:12px}
.psec:last-child{margin-bottom:0}
.psl{font-size:10px;font-weight:600;color:#5a5048;letter-spacing:1px;margin-bottom:6px}
.pgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.pi{padding:6px 2px;border-radius:8px;border:1px solid #2a2420;background:transparent;color:#8a8072;font-size:10px;cursor:pointer;text-align:center}
.pi:active{transform:scale(.92)}
.pi .ic{font-size:14px;display:block}
.pi.act{border-color:#ff8a6a;background:rgba(255,138,106,.1);color:#ff8a6a}
.srow{display:flex;gap:6px}
.sb{flex:1;padding:8px;border-radius:8px;border:1px solid #2a2420;background:transparent;color:#8a8072;font-size:11px;cursor:pointer;text-align:center;font-weight:600}
.sb:active{transform:scale(.95)}
.sb.done{background:rgba(106,176,200,.1);border-color:#6ab0c8;color:#6ab0c8}
.sl{width:100%;-webkit-appearance:none;height:3px;border-radius:2px;background:linear-gradient(90deg,#3a3028,#ff8a6a);outline:none;cursor:pointer}
.sl::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#ff8a6a;border:none;cursor:pointer}
.sl-hd{display:flex;justify-content:space-between;font-size:11px;color:#5a5048;margin-bottom:2px}

#err{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff6b6b;font-size:13px;text-align:center;z-index:20;display:none;background:rgba(26,22,20,.95);padding:20px;border-radius:16px;max-width:300px}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="top">
  <div id="info">4:4 <span>·</span> 80 bpm</div>
  <div id="top-right">
    <button class="tb" id="gearBtn">⚙</button>
    <button class="tb" id="fsBtn">⛶</button>
  </div>
</div>

<div id="bar">
  <div id="bar-inner">
    <div class="bctrl">
      <span class="lbl a">A</span>
      <button class="b" data-t="a" data-d="-1">−</button>
      <span class="n" id="bA">4</span>
      <button class="b" data-t="a" data-d="1">+</button>
    </div>
    <button id="btn" class="g">▶</button>
    <div class="bctrl">
      <span class="lbl b">B</span>
      <button class="b" data-t="b" data-d="-1">−</button>
      <span class="n" id="bB">4</span>
      <button class="b" data-t="b" data-d="1">+</button>
    </div>
  </div>
</div>

<div id="panel">
  <div id="panel-hd"><span>设置</span><span style="font-size:16px;cursor:pointer" id="panelCls">✕</span></div>
  <div class="psec"><div class="psl">音色</div><div class="pgrid" id="pgrid"></div></div>
  <div class="psec"><div class="psl">采样器</div><div class="srow"><button class="sb" id="smpA">● 录 A</button><button class="sb" id="smpB">● 录 B</button></div></div>
  <div class="psec"><div class="sl-hd"><span>Swing</span><span id="swVal">50%</span></div><input type="range" class="sl" id="swSl" min="50" max="75" value="50" step="0.5"></div>
  <div class="psec"><div class="sl-hd"><span>音量</span><span id="volVal">80%</span></div><input type="range" class="sl" id="volSl" min="0" max="100" value="80" step="1"></div>
</div>

<div id="err"></div>

<script>
(function(){
'use strict';
function logErr(m){var e=document.getElementById('err');e.textContent=m;e.style.display='block';console.error(m)}

// ===== State =====
var S={bpm:80,play:false,ba:4,bb:4,tick:0,swing:50,vol:80,preset:'analog',sampler:{a:null,b:null},rec:null};
var ac=null,mg=null,ntt=0,tid=null,pst=0,fx=null;

// ===== Audio =====
function makeDist(a){
  var n=256,c=new Float32Array(n);
  for(var i=0;i<n;i++){var x=i/n*2-1;c[i]=((Math.PI+a)*x)/(Math.PI+a*Math.abs(x))}
  return c
}
function mkIR(d,dec){
  var sr=ac.sampleRate,l=Math.floor(sr*d),b=ac.createBuffer(2,l,sr);
  for(var ch=0;ch<2;ch++){var d2=b.getChannelData(ch);for(var i=0;i<l;i++)d2[i]=(Math.random()*2-1)*Math.pow(1-i/l,dec)}
  return b
}
function mkNoise(){
  var sr=ac.sampleRate,l=Math.floor(sr*0.3),b=ac.createBuffer(1,l,sr),d=b.getChannelData(0);
  for(var i=0;i<l;i++)d[i]=Math.random()*2-1;return b
}

function initAudio(){
  if(ac)return;
  try{
    var AC=window.AudioContext||window.webkitAudioContext;
    if(!AC){logErr('浏览器不支持 Web Audio');return}
    ac=new AC();
    mg=ac.createGain();mg.gain.value=S.vol/100;mg.connect(ac.destination);
    fx={};
    var comp=ac.createDynamicsCompressor();comp.threshold.value=-18;comp.ratio.value=3;comp.attack.value=.002;comp.release.value=.08;comp.connect(mg);fx.comp=comp;
    fx.dist=makeDist(15);
    var ir=mkIR(.12,3),conv=ac.createConvolver();conv.buffer=ir;
    var rs=ac.createGain();rs.gain.value=.3;var ro=ac.createGain();ro.gain.value=.4;
    rs.connect(conv);conv.connect(ro);ro.connect(mg);fx.rev=rs;
    fx.noise=mkNoise();
  }catch(e){logErr('音频初始化失败')}
}
function gcd(a,b){while(b){var t=b;b=a%b;a=t}return a}
function lcm(a,b){return a*b/gcd(a,b)}
function bd(){return 60/S.bpm}

// ===== Sound engine =====
function analogKick(t,f,d,l){
  if(!ac||!fx)return;
  try{
    var fi=ac.createBiquadFilter();fi.type='lowpass';fi.frequency.setValueAtTime(3000,t);fi.frequency.exponentialRampToValueAtTime(60,t+d);fi.Q.setValueAtTime(.7,t);
    var st=ac.createWaveShaper();st.curve=fx.dist;var dr=ac.createGain();dr.gain.setValueAtTime(l,t);var rv=ac.createGain();rv.gain.setValueAtTime(l*.25,t);var sm=ac.createGain();sm.gain.setValueAtTime(1,t);
    var vs=[{ty:'triangle',d:0,g:.5},{ty:'square',d:0,g:.25},{ty:'triangle',d:3,g:.15},{ty:'square',d:-2,g:.1}];
    for(var i=0;i<4;i++){var o=ac.createOscillator();o.type=vs[i].ty;o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(50,t+d*.8);o.detune.setValueAtTime(vs[i].d,t);var g=ac.createGain();g.gain.setValueAtTime(vs[i].g,t);o.connect(g);g.connect(sm);o.start(t);o.stop(t+d+.02)}
    sm.connect(fi);fi.connect(st);st.connect(dr);dr.connect(fx.comp);st.connect(rv);rv.connect(fx.rev);
  }catch(e){}
}
function sineK(t,f,d,l){if(!ac)return;try{var o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(f,t);var g=ac.createGain();g.gain.setValueAtTime(l,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(fx.comp);o.start(t);o.stop(t+d)}catch(e){}}
function sqK(t,f,d,l){if(!ac)return;try{var o=ac.createOscillator();o.type='square';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(40,t+d*.7);var g=ac.createGain();g.gain.setValueAtTime(l,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(fx.comp);o.start(t);o.stop(t+d)}catch(e){}}
function noiseK(t,d,l,bpf){if(!ac||!fx)return;try{var s=ac.createBufferSource();s.buffer=fx.noise;var g=ac.createGain();g.gain.setValueAtTime(l,t);g.gain.exponentialRampToValueAtTime(.001,t+d);if(bpf){var f=ac.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(2000,t);f.Q.setValueAtTime(2,t);s.connect(f);f.connect(g)}else s.connect(g);g.connect(fx.comp);s.start(t);s.stop(t+d)}catch(e){}}
function wdK(t,f,d,l){if(!ac)return;try{var o=ac.createOscillator();o.type='triangle';o.frequency.setValueAtTime(f,t);var g=ac.createGain();g.gain.setValueAtTime(l,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(fx.comp);o.start(t);o.stop(t+d)}catch(e){}}
function click(t,f,l,r){if(!ac||!fx)return;try{var o=ac.createOscillator();o.type='triangle';o.frequency.setValueAtTime(f,t);var g=ac.createGain();g.gain.setValueAtTime(l,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);var s=ac.createWaveShaper();s.curve=fx.dist;var d=ac.createGain();d.gain.setValueAtTime(1,t);o.connect(g);g.connect(s);s.connect(d);d.connect(fx.comp);if(r>0){var v=ac.createGain();v.gain.setValueAtTime(r,t);s.connect(v);v.connect(fx.rev)}o.start(t);o.stop(t+.05)}catch(e){}}
function bell(t,f,l,r){if(!ac||!fx)return;try{var o=ac.createOscillator();o.type='triangle';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*.7,t+.04);var g=ac.createGain();g.gain.setValueAtTime(l,t);g.gain.exponentialRampToValueAtTime(.001,t+.05);var s=ac.createWaveShaper();s.curve=fx.dist;o.connect(g);g.connect(s);s.connect(fx.comp);if(r>0){var v=ac.createGain();v.gain.setValueAtTime(r,t);s.connect(v);v.connect(fx.rev)}o.start(t);o.stop(t+.06)}catch(e){}}
function playS(t,b,l){if(!ac||!b)return;try{var s=ac.createBufferSource();s.buffer=b;var g=ac.createGain();g.gain.setValueAtTime(l,t);s.connect(g);g.connect(fx.comp);s.start(t)}catch(e){}}

function playA(t,accent){
  if(S.sampler.a){playS(t,S.sampler.a,accent?.6:.4);return}
  var p=S.preset;
  if(p==='analog'){var f1=accent?180:140,d1=accent?.18:.13;analogKick(t,f1,d1,accent?.6:.4);return}
  if(p==='808'){sineK(t,accent?60:50,accent?.35:.3,accent?.6:.4);return}
  if(p==='elec'){sqK(t,accent?120:100,accent?.1:.08,accent?.5:.3);return}
  if(p==='clap'){noiseK(t,accent?.1:.08,accent?.4:.25,false);return}
  if(p==='wood'){wdK(t,accent?2500:2000,accent?.03:.02,accent?.5:.3);return}
  if(p==='noise'){noiseK(t,accent?.12:.08,accent?.5:.3,true);return}
  analogKick(t,140,.15,.4)
}
function playB(t,accent){
  if(S.sampler.b){playS(t,S.sampler.b,accent?.3:.2);return}
  var p=S.preset;
  if(p==='analog'){bell(t,accent?1100:800,accent?.25:.15,.3);return}
  if(p==='808'){bell(t,accent?550:440,accent?.2:.12,.05);return}
  if(p==='elec'){bell(t,accent?950:750,accent?.18:.1,0);return}
  if(p==='clap'){click(t,accent?350:280,accent?.12:.08,0);return}
  if(p==='wood'){click(t,accent?4000:3200,accent?.15:.1,0);return}
  if(p==='noise'){click(t,accent?1200:900,accent?.1:.06,0);return}
  bell(t,1100,.25,.3)
}

// ===== Scheduler =====
function sched(){
  if(!S.play)return;
  try{
    var now=ac.currentTime;if(ntt<now)ntt=now;
    var beat=bd(),ba=S.ba,bb=S.bb,LCM=lcm(ba,bb),td=beat/(LCM/4);
    while(ntt<now+.15){
      if(S.tick%LCM===0){
        var bs=ntt;
        for(var i=0;i<ba;i++)playA(bs+i*(beat*4/ba),i===0);
        for(var i=0;i<bb;i++)playB(bs+i*(beat*4/bb),i===0);
      }
      ntt+=td;S.tick++;
    }
  }catch(e){}
  tid=requestAnimationFrame(sched);
}

// ===== Canvas =====
var cv=document.getElementById('c'),ctx=cv.getContext('2d');
var W,H;

function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

function ei(t){return t*t}

function draw(){
  ctx.clearRect(0,0,W,H);
  var cx_=W/2,cy=H/2,mr=Math.min(W,H)*.33,rA=mr*.65,rB=mr*.95,ba=S.ba,bb=S.bb;
  
  var bp=0;
  if(S.play&&ac){var el=ac.currentTime-pst;if(el>0)bp=el%(bd()*4)}
  
  var aD=bd()*4/ba,bD=bd()*4/bb;
  var aI=Math.floor(bp/aD)%ba,bI=Math.floor(bp/bD)%bb;
  var aP=(bp%aD)/aD,bP=(bp%bD)/bD;
  
  // B outer
  ctx.beginPath();ctx.arc(cx_,cy,rB,0,Math.PI*2);
  ctx.strokeStyle=S.play?'rgba(106,176,200,.25)':'rgba(106,176,200,.35)';ctx.lineWidth=1.5;ctx.stroke();
  for(var i=0;i<bb;i++){
    var a=-Math.PI/2+i*(Math.PI*2/bb);
    var x=cx_+rB*Math.cos(a),y=cy+rB*Math.sin(a);
    ctx.beginPath();ctx.arc(x,y,i===bI?5:4,0,Math.PI*2);
    ctx.fillStyle=i===bI?'rgba(106,176,200,.6)':'rgba(106,176,200,.35)';ctx.fill();
    if(i===0){ctx.beginPath();ctx.arc(x,y,7,0,Math.PI*2);ctx.fillStyle='rgba(106,176,200,.7)';ctx.fill()}
  }
  if(S.play){
    var bE=ei(bP),bA=-Math.PI/2+bI*(Math.PI*2/bb)+bE*(Math.PI*2/bb);
    var bx=cx_+rB*Math.cos(bA),by=cy+rB*Math.sin(bA);
    var g=ctx.createRadialGradient(bx,by,0,bx,by,12);
    g.addColorStop(0,'rgba(106,176,200,.9)');g.addColorStop(.5,'rgba(106,176,200,.3)');g.addColorStop(1,'rgba(106,176,200,0)');
    ctx.beginPath();ctx.arc(bx,by,12,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(bx,by,5,0,Math.PI*2);ctx.fillStyle='#6ab0c8';ctx.fill()
  }
  
  // A inner
  ctx.beginPath();ctx.arc(cx_,cy,rA,0,Math.PI*2);
  ctx.strokeStyle=S.play?'rgba(255,138,106,.25)':'rgba(255,138,106,.35)';ctx.lineWidth=1.5;ctx.stroke();
  for(var i=0;i<ba;i++){
    var a=-Math.PI/2+i*(Math.PI*2/ba);
    var x=cx_+rA*Math.cos(a),y=cy+rA*Math.sin(a);
    ctx.beginPath();ctx.arc(x,y,i===aI?5:4,0,Math.PI*2);
    ctx.fillStyle=i===aI?'rgba(255,138,106,.6)':'rgba(255,138,106,.35)';ctx.fill();
    if(i===0){ctx.beginPath();ctx.arc(x,y,7,0,Math.PI*2);ctx.fillStyle='rgba(255,138,106,.7)';ctx.fill()}
  }
  if(S.play){
    var aE=ei(aP),aA=-Math.PI/2+aI*(Math.PI*2/ba)+aE*(Math.PI*2/ba);
    var ax=cx_+rA*Math.cos(aA),ay=cy+rA*Math.sin(aA);
    var g=ctx.createRadialGradient(ax,ay,0,ax,ay,16);
    g.addColorStop(0,'rgba(255,138,106,1)');g.addColorStop(.4,'rgba(255,138,106,.5)');g.addColorStop(1,'rgba(255,138,106,0)');
    ctx.beginPath();ctx.arc(ax,ay,16,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(ax,ay,6,0,Math.PI*2);ctx.fillStyle='#ff8a6a';ctx.fill()
  }
  
  // Center
  ctx.fillStyle='#3a3028';ctx.font='700 14px sans-serif';ctx.textAlign='center';
  ctx.fillText(S.ba+':'+S.bb,cx_,cy+4);
  
  if(!S.play){
    ctx.fillStyle='rgba(255,138,106,.5)';ctx.font='600 15px sans-serif';
    ctx.fillText('点这里',cx_,cy+40);
    var p=.3+.2*Math.sin(Date.now()/800);
    ctx.beginPath();ctx.arc(cx_,cy,mr*.35,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,138,106,'+p+')';ctx.lineWidth=2;ctx.stroke()
  }
  
  requestAnimationFrame(draw);
}

// ===== Controls =====
function start(){
  initAudio();if(!ac)return;
  if(ac.state==='suspended')ac.resume();
  S.play=true;S.tick=0;ntt=ac.currentTime+.05;pst=ac.currentTime+.05;
  try{ac.onstatechange=function(){if(ac.state==='suspended'&&S.play)ac.resume()}}catch(e){}
  document.getElementById('btn').textContent='■';document.getElementById('btn').className='s';
  sched();
}
function stop(){
  S.play=false;if(tid){cancelAnimationFrame(tid);tid=null}S.tick=0;
  document.getElementById('btn').textContent='▶';document.getElementById('btn').className='g';
}
function toggle(){S.play?stop():start()}

function setBpm(v){S.bpm=Math.max(30,Math.min(300,v));updInfo()}
function setBeats(tr,d){
  if(S.play)stop();
  S[tr==='a'?'ba':'bb']=Math.max(2,Math.min(16,S[tr==='a'?'ba':'bb']+d));
  document.getElementById(tr==='a'?'bA':'bB').textContent=S[tr==='a'?'ba':'bb'];
  updInfo()
}
function updInfo(){document.getElementById('info').innerHTML=S.ba+':'+S.bb+'<span> · </span>'+S.bpm+' bpm'}

var PRESETS={analog:{n:'Analog',ic:'◈'},'808':{n:'808',ic:'◉'},elec:{n:'Elec',ic:'◇'},clap:{n:'Clap',ic:'👏'},wood:{n:'Wood',ic:'▣'},noise:{n:'Snare',ic:'⚡'}};
var PKEYS=['analog','808','elec','clap','wood','noise'];

function setPreset(k){
  if(S.play)stop();S.preset=k;
  document.querySelectorAll('.pi').forEach(function(e){e.classList.toggle('act',e.dataset.p===k)})
}

// ===== Sampler =====
function recSamp(t){
  if(S.rec)return;
  try{
    var s=navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false}});
    s.then(function(st){
      var c=[],r=new MediaRecorder(st,{mimeType:'audio/webm;codecs=opus'});
      r.ondataavailable=function(e){if(e.data.size>0)c.push(e.data)};
      r.onstop=function(){
        var fr=new FileReader();
        fr.onloadend=function(){ac.decodeAudioData(fr.result,function(b){
          var sr=b.sampleRate,len=Math.min(Math.floor(sr*.3),b.length),tb=ac.createBuffer(1,len,sr);
          var src=b.getChannelData(0),dst=tb.getChannelData(0);
          for(var i=0;i<len;i++)dst[i]=src[i];S.sampler[t]=tb;
          document.getElementById(t==='a'?'smpA':'smpB').textContent='✓ '+t.toUpperCase();
          document.getElementById(t==='a'?'smpA':'smpB').classList.add('done');
          st.getTracks().forEach(function(t){t.stop()})
        },function(){})};fr.readAsArrayBuffer(new Blob(c,{type:'audio/webm'}))
      };
      S.rec=t;r.start();
      setTimeout(function(){if(S.rec===t){r.stop();S.rec=null}},1200)
    },function(){})
  }catch(e){}
}

// ===== Init =====
function init(){
  try{
    // Play
    document.getElementById('btn').addEventListener('click',function(e){e.stopPropagation();toggle()});
    cv.addEventListener('click',toggle);
    
    // BPM
    document.getElementById('bar').addEventListener('click',function(e){if(e.target.matches('#btn'))return});
    
    // Track beats
    document.querySelectorAll('.b').forEach(function(el){
      el.addEventListener('click',function(){setBeats(this.dataset.t,parseInt(this.dataset.d))})
    });
    
    // Fullscreen
    document.getElementById('fsBtn').addEventListener('click',function(){
      if(!document.fullscreenElement)document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });
    document.addEventListener('fullscreenchange',function(){document.getElementById('fsBtn').textContent=document.fullscreenElement?'✕':'⛶'});
    
    // Gear panel
    document.getElementById('gearBtn').addEventListener('click',function(){document.getElementById('panel').classList.toggle('open')});
    document.getElementById('panelCls').addEventListener('click',function(){document.getElementById('panel').classList.remove('open')});
    
    // Presets
    var pg=document.getElementById('pgrid');
    for(var i=0;i<PKEYS.length;i++){
      var k=PKEYS[i],p=PRESETS[k],el=document.createElement('div');
      el.className='pi'+(k===S.preset?' act':'');el.dataset.p=k;
      el.innerHTML='<span class="ic">'+p.ic+'</span>'+p.n;
      el.addEventListener('click',function(){setPreset(this.dataset.p)});pg.appendChild(el)
    }
    
    // Sampler
    document.getElementById('smpA').addEventListener('click',function(){recSamp('a')});
    document.getElementById('smpB').addEventListener('click',function(){recSamp('b')});
    
    // Swing slider
    document.getElementById('swSl').addEventListener('input',function(){S.swing=parseFloat(this.value);document.getElementById('swVal').textContent=this.value+'%'});
    
    // Volume slider
    document.getElementById('volSl').addEventListener('input',function(){S.vol=parseFloat(this.value);document.getElementById('volVal').textContent=this.value+'%';if(mg)mg.gain.value=S.vol/100});
    
    // Keyboard
    document.addEventListener('keydown',function(e){
      if(e.code==='Space'){e.preventDefault();toggle()}
      if(e.key==='ArrowUp')setBpm(S.bpm+5);
      if(e.key==='ArrowDown')setBpm(S.bpm-5);
    });
    
    setBpm(80);resize();draw();
  }catch(e){logErr('初始化出错')}
}
init()
})();
</script>
</body>
</html>
