<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>节拍游乐场</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:#1a1614;min-height:100dvh;overflow:hidden;color:#f0ece6
}
#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;background:#1a1614}
.bar{
  position:fixed;bottom:0;left:0;right:0;z-index:5;
  background:linear-gradient(transparent,rgba(26,22,20,.95) 30%);
  padding:50px 16px 24px;display:flex;align-items:center;justify-content:center;gap:16px
}
.bar-btn{width:52px;height:52px;border-radius:50%;border:none;font-size:20px;cursor:pointer}
.bar-btn.go{background:#ff8a6a;color:#fff;box-shadow:0 4px 16px rgba(255,138,106,.3)}
.bar-btn.go:active{transform:scale(.9)}
.bar-btn.stp{background:#3a3028;color:#f0ece6}
.bar-btn.stp:active{transform:scale(.9)}
.top-left{
  position:fixed;top:14px;left:14px;z-index:5;
  font-size:12px;font-weight:600;color:#5a5048;letter-spacing:1.5px;pointer-events:none
}
.top-left span{color:#ff8a6a}
.top-right{
  position:fixed;top:14px;right:14px;z-index:5;
  padding:6px 12px;border-radius:16px;background:rgba(60,50,40,.6);border:none;
  color:#a0988a;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px
}
.top-right:active{transform:scale(.92)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="top-left" id="infoTxt">4:4 <span>·</span> 80 bpm</div>
<button class="top-right" id="fsBtn">⛶</button>
<div class="bar" id="bar">
  <button class="bar-btn go" id="playBtn">▶</button>
</div>
<script>
(function(){
'use strict';
const S={bpm:80,play:false,ba:4,bb:4,tick:0};
let ac=null,mg=null,ntt=0,tid=null,pst=0,fx=null;

// Audio
function md(a){const n=256,c=new Float32Array(n);for(let i=0;i<n;i++){const x=i/n*2-1;c[i]=((Math.PI+a)*x)/(Math.PI+a*Math.abs(x))}return c}
function mir(c,d,dec){const r=c.sampleRate,l=Math.floor(r*d),b=c.createBuffer(2,l,r);for(let ch=0;ch<2;ch++){const d=b.getChannelData(ch);for(let i=0;i<l;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/l,dec)}return b}
function mn(c,d){const r=c.sampleRate,l=Math.floor(r*d),b=c.createBuffer(1,l,r),d=b.getChannelData(0);for(let i=0;i<l;i++)d[i]=Math.random()*2-1;return b}
function ia(){
  if(ac)return;
  try{
    ac=new(window.AudioContext||window.webkitAudioContext)();
    mg=ac.createGain();mg.gain.setValueAtTime(.8,ac.currentTime);mg.connect(ac.destination);
    fx={};
    const c=ac.createDynamicsCompressor();c.threshold.setValueAtTime(-18,ac.currentTime);c.knee.setValueAtTime(6,ac.currentTime);c.ratio.setValueAtTime(3,ac.currentTime);c.attack.setValueAtTime(.002,ac.currentTime);c.release.setValueAtTime(.08,ac.currentTime);c.connect(mg);fx.comp=c;
    const ir=mir(ac,.12,3),v=ac.createConvolver();v.buffer=ir;const rs=ac.createGain();rs.gain.setValueAtTime(.3,ac.currentTime);const ro=ac.createGain();ro.gain.setValueAtTime(.4,ac.currentTime);rs.connect(v);v.connect(ro);ro.connect(mg);fx.rev=rs;
    fx.dist=md(15);fx.noise=mn(ac,.3);
  }catch(e){console.warn('Audio init failed:',e)}
}
function gcd(a,b){while(b){[a,b]=[b,a%b]}return a}function lcm(a,b){return(a*b)/gcd(a,b)}
function gbd(){return 60/S.bpm}

function bk(t,f,d,l,a2){
  if(!ac||!fx)return;
  try{
    const fi=ac.createBiquadFilter();fi.type='lowpass';fi.frequency.setValueAtTime(3000,t);fi.frequency.exponentialRampToValueAtTime(60,t+d);fi.Q.setValueAtTime(.7,t);
    const st=ac.createWaveShaper();st.curve=fx.dist;const dr=ac.createGain();dr.gain.setValueAtTime(l,t);const rv=ac.createGain();rv.gain.setValueAtTime(l*.25,t);const sm=ac.createGain();
    sm.gain.setValueAtTime(1,t);
    const vs=a2?[{t:'triangle',d:0,g:.5},{t:'square',d:0,g:.25},{t:'triangle',d:3,g:.15},{t:'square',d:-2,g:.1}]:[{t:'triangle',d:0,g:.45},{t:'square',d:0,g:.2},{t:'triangle',d:2.5,g:.12},{t:'square',d:-2,g:.08}];
    for(const v of vs){const o=ac.createOscillator();o.type=v.t;o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(50,t+d*.8);o.detune.setValueAtTime(v.d,t);const g=ac.createGain();g.gain.setValueAtTime(v.g,t);o.connect(g);g.connect(sm);o.start(t);o.stop(t+d+.02)}
    sm.connect(fi);fi.connect(st);st.connect(dr);dr.connect(fx.comp);st.connect(rv);rv.connect(fx.rev)
  }catch(e){}
}
function sk(t,f,d,l){try{if(!ac)return;const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(f,t);const g=ac.createGain();g.gain.setValueAtTime(l,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(fx.comp);o.start(t);o.stop(t+d)}catch(e){}}
function ek(t,f,d,l){try{if(!ac)return;const o=ac.createOscillator();o.type='square';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(40,t+d*.7);const g=ac.createGain();g.gain.setValueAtTime(l,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(fx.comp);o.start(t);o.stop(t+d)}catch(e){}}
function nk(t,d,l,b2){try{if(!ac||!fx)return;const s=ac.createBufferSource();s.buffer=fx.noise;const g=ac.createGain();g.gain.setValueAtTime(l,t);g.gain.exponentialRampToValueAtTime(.001,t+d);if(b2){const f=ac.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(2000,t);f.Q.setValueAtTime(2,t);s.connect(f);f.connect(g)}else s.connect(g);g.connect(fx.comp);s.start(t);s.stop(t+d)}catch(e){}}
function wk(t,f,d,l){try{if(!ac)return;const o=ac.createOscillator();o.type='triangle';o.frequency.setValueAtTime(f,t);const g=ac.createGain();g.gain.setValueAtTime(l,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(fx.comp);o.start(t);o.stop(t+d)}catch(e){}}
function ct(t,f,l,r){try{if(!ac||!fx)return;const o=ac.createOscillator();o.type='triangle';o.frequency.setValueAtTime(f,t);const g=ac.createGain();g.gain.setValueAtTime(l,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);const s=ac.createWaveShaper();s.curve=fx.dist;const d=ac.createGain();d.gain.setValueAtTime(1,t);o.connect(g);g.connect(s);s.connect(d);d.connect(fx.comp);if(r>0){const v=ac.createGain();v.gain.setValueAtTime(r,t);s.connect(v);v.connect(fx.rev)}o.start(t);o.stop(t+.05)}catch(e){}}
function bt(t,f,l,r){try{if(!ac||!fx)return;const o=ac.createOscillator();o.type='triangle';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*.7,t+.04);const g=ac.createGain();g.gain.setValueAtTime(l,t);g.gain.exponentialRampToValueAtTime(.001,t+.05);const s=ac.createWaveShaper();s.curve=fx.dist;o.connect(g);g.connect(s);s.connect(fx.comp);if(r>0){const v=ac.createGain();v.gain.setValueAtTime(r,t);s.connect(v);v.connect(fx.rev)}o.start(t);o.stop(t+.06)}catch(e){}}
function ps(t,b,l){try{if(!ac||!b)return;const s=ac.createBufferSource();s.buffer=b;const g=ac.createGain();g.gain.setValueAtTime(l,t);s.connect(g);g.connect(fx.comp);s.start(t)}catch(e){}}

function pt(t,tr,a2){
  if(tr==='a'){
    const p='analog';
    if(p==='analog'){bk(t,a2?180:140,a2?.18:.13,a2?.6:.4,a2);return}
  }else{
    const p='analog';
    if(p==='analog'){bt(t,a2?1100:800,a2?.25:.15,.3);return}
  }
}

// Scheduler
function sl(){
  if(!S.play)return;
  try{
    const n=ac.currentTime;if(ntt<n)ntt=n;
    const bd=gbd(),ba=S.ba,bb=S.bb,L=lcm(ba,bb),td=bd/(L/4);
    while(ntt<n+.15){
      if(S.tick%L===0){const bs=ntt;for(let i=0;i<ba;i++)pt(bs+i*(bd*4/ba),'a',i===0);for(let i=0;i<bb;i++)pt(bs+i*(bd*4/bb),'b',i===0)}
      ntt+=td;S.tick++
    }
  }catch(e){}
  tid=requestAnimationFrame(sl)
}

// Canvas
const cn=document.getElementById('c'),ctx=cn.getContext('2d');
let W,H;

function rs(){W=cn.width=window.innerWidth;H=cn.height=window.innerHeight}
window.addEventListener('resize',rs);rs();

function ei(t){return t*t}

function dr(){
  ctx.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,mr=Math.min(W,H)*.33,rA=mr*.65,rB=mr*.95,ba=S.ba,bb=S.bb;
  
  let bp=0;
  if(S.play&&ac){const e=ac.currentTime-pst;if(e>0)bp=e%(gbd()*4)}
  
  const aD=gbd()*4/ba,bD=gbd()*4/bb;
  const aI=Math.floor(bp/aD)%ba,bI=Math.floor(bp/bD)%bb;
  const aP=(bp%aD)/aD,bP=(bp%bD)/bD;
  
  // Track B
  ctx.beginPath();ctx.arc(cx,cy,rB,0,2*Math.PI);
  ctx.strokeStyle=S.play?'rgba(106,176,200,.25)':'rgba(106,176,200,.35)';ctx.lineWidth=1.5;ctx.stroke();
  for(let i=0;i<bb;i++){
    const a=-Math.PI/2+i*(2*Math.PI/bb);
    const x=cx+rB*Math.cos(a),y=cy+rB*Math.sin(a);
    ctx.beginPath();ctx.arc(x,y,i===bI?5:4,0,2*Math.PI);
    ctx.fillStyle=i===bI?'rgba(106,176,200,.6)':'rgba(106,176,200,.35)';ctx.fill();
    if(i===0){ctx.beginPath();ctx.arc(x,y,7,0,2*Math.PI);ctx.fillStyle='rgba(106,176,200,.7)';ctx.fill()}
  }
  if(S.play){
    const bE=ei(bP),bA=-Math.PI/2+bI*(2*Math.PI/bb)+bE*(2*Math.PI/bb);
    const bx=cx+rB*Math.cos(bA),by=cy+rB*Math.sin(bA);
    const g=ctx.createRadialGradient(bx,by,0,bx,by,12);
    g.addColorStop(0,'rgba(106,176,200,.9)');g.addColorStop(.5,'rgba(106,176,200,.3)');g.addColorStop(1,'rgba(106,176,200,0)');
    ctx.beginPath();ctx.arc(bx,by,12,0,2*Math.PI);ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(bx,by,5,0,2*Math.PI);ctx.fillStyle='#6ab0c8';ctx.fill()
  }
  
  // Track A
  ctx.beginPath();ctx.arc(cx,cy,rA,0,2*Math.PI);
  ctx.strokeStyle=S.play?'rgba(255,138,106,.25)':'rgba(255,138,106,.35)';ctx.lineWidth=1.5;ctx.stroke();
  for(let i=0;i<ba;i++){
    const a=-Math.PI/2+i*(2*Math.PI/ba);
    const x=cx+rA*Math.cos(a),y=cy+rA*Math.sin(a);
    ctx.beginPath();ctx.arc(x,y,i===aI?5:4,0,2*Math.PI);
    ctx.fillStyle=i===aI?'rgba(255,138,106,.6)':'rgba(255,138,106,.35)';ctx.fill();
    if(i===0){ctx.beginPath();ctx.arc(x,y,7,0,2*Math.PI);ctx.fillStyle='rgba(255,138,106,.7)';ctx.fill()}
  }
  if(S.play){
    const aE=ei(aP),aA=-Math.PI/2+aI*(2*Math.PI/ba)+aE*(2*Math.PI/ba);
    const ax=cx+rA*Math.cos(aA),ay=cy+rA*Math.sin(aA);
    const g=ctx.createRadialGradient(ax,ay,0,ax,ay,16);
    g.addColorStop(0,'rgba(255,138,106,1)');g.addColorStop(.4,'rgba(255,138,106,.5)');g.addColorStop(1,'rgba(255,138,106,0)');
    ctx.beginPath();ctx.arc(ax,ay,16,0,2*Math.PI);ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(ax,ay,6,0,2*Math.PI);ctx.fillStyle='#ff8a6a';ctx.fill()
  }
  
  // Center
  ctx.fillStyle='#3a3028';ctx.font='700 14px sans-serif';ctx.textAlign='center';
  ctx.fillText(S.ba+':'+S.bb,cx,cy+4);
  
  if(!S.play){
    ctx.fillStyle='rgba(255,138,106,.5)';ctx.font='600 15px sans-serif';
    ctx.fillText('点屏幕开始',cx,cy+40);
    const p=.3+.2*Math.sin(Date.now()/800);
    ctx.beginPath();ctx.arc(cx,cy,mr*.35,0,2*Math.PI);
    ctx.strokeStyle='rgba(255,138,106,'+p+')';ctx.lineWidth=2;ctx.stroke()
  }
  
  requestAnimationFrame(dr)
}

// Controls
function go(){
  ia();if(!ac)return;
  if(ac.state==='suspended')ac.resume()
  S.play=true;S.tick=0;ntt=ac.currentTime+.05;pst=ac.currentTime+.05
  try{ac.onstatechange=function(){if(ac.state==='suspended'&&S.play)ac.resume()}}catch(e){}
  document.getElementById('playBtn').textContent='■';document.getElementById('playBtn').className='bar-btn stp'
  sl()
}
function stp(){
  S.play=false;if(tid){cancelAnimationFrame(tid);tid=null}
  S.tick=0;document.getElementById('playBtn').textContent='▶';document.getElementById('playBtn').className='bar-btn go'
}
function tg(){S.play?stp():go()}
function bpm(v){S.bpm=Math.max(30,Math.min(300,v));document.getElementById('infoTxt').innerHTML=S.ba+':'+S.bb+' <span>·</span> '+S.bpm+' bpm'}

// Init
function init(){
  document.getElementById('playBtn').addEventListener('click',function(e){e.stopPropagation();tg()})
  // Canvas tap to start/stop
  cn.addEventListener('click',tg)
  // Fullscreen
  document.getElementById('fsBtn').addEventListener('click',function(){
    if(!document.fullscreenElement){document.documentElement.requestFullscreen?.()}else{document.exitFullscreen?.()}
  })
  document.addEventListener('fullscreenchange',function(){
    document.getElementById('fsBtn').textContent=document.fullscreenElement?'✕':'⛶'
  })
  // Keyboard
  document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();tg()}if(e.key==='ArrowUp')bpm(S.bpm+5);if(e.key==='ArrowDown')bpm(S.bpm-5)})
  
  bpm(80);rs();dr()
}

// Wait for DOM
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init)
else init()
})();
</script>
</body>
</html>
