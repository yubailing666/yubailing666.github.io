<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>节拍游乐场</title>
<style>
*{margin:0;padding:0}
body{background:#1a1614;overflow:hidden;font-family:sans-serif}
#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;background:#1a1614;display:block}
#bar{
  position:fixed;bottom:0;left:0;right:0;z-index:5;text-align:center;
  background:linear-gradient(transparent,rgba(26,22,20,.92) 25%);
  padding:50px 0 28px;pointer-events:none
}
#bar > *{pointer-events:auto}
#btn{
  width:56px;height:56px;border-radius:50%;border:none;
  font-size:22px;cursor:pointer;display:inline-block
}
#btn.g{background:#ff8a6a;color:#fff;box-shadow:0 4px 16px rgba(255,138,106,.3)}
#btn.s{background:#3a3028;color:#f0ece6}
#info{
  position:fixed;top:14px;left:14px;z-index:5;
  font-size:12px;font-weight:600;color:#5a5048;letter-spacing:1.5px
}
#info span{color:#ff8a6a}
#fs{
  position:fixed;top:14px;right:14px;z-index:5;
  padding:6px 12px;border-radius:16px;background:rgba(60,50,40,.6);border:none;
  color:#a0988a;font-size:11px;cursor:pointer
}
#err{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#ff6b6b;font-size:13px;text-align:center;z-index:10;display:none;
  background:rgba(26,22,20,.9);padding:20px;border-radius:16px;max-width:300px
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">4:4 <span>·</span> 80 bpm</div>
<button id="fs">⛶</button>
<div id="bar"><button id="btn" class="g">▶</button></div>
<div id="err"></div>
<script>
(function(){
'use strict';

function logErr(msg){
  var el=document.getElementById('err');
  el.textContent=msg;el.style.display='block';
  console.error(msg);
}

// State
var S={bpm:80,play:false,ba:4,bb:4,tick:0};
var ac=null,mg=null,ntt=0,tid=null,pst=0,fx=null;

// Audio init
function initAudio(){
  if(ac)return;
  try{
    var AC=window.AudioContext||window.webkitAudioContext;
    if(!AC){logErr('浏览器不支持 Web Audio');return}
    ac=new AC();
    mg=ac.createGain();
    mg.gain.value=0.8;
    mg.connect(ac.destination);
    
    fx={};
    var comp=ac.createDynamicsCompressor();
    comp.threshold.value=-18;
    comp.ratio.value=3;
    comp.attack.value=0.002;
    comp.release.value=0.08;
    comp.connect(mg);
    fx.comp=comp;
    fx.dist=makeDist(15);
  }catch(e){logErr('音频初始化失败: '+e.message)}
}

function makeDist(a){
  var n=256,c=new Float32Array(n);
  for(var i=0;i<n;i++){var x=i/n*2-1;c[i]=((Math.PI+a)*x)/(Math.PI+a*Math.abs(x))}
  return c
}

function gcd(a,b){while(b){var t=b;b=a%b;a=t}return a}
function lcm(a,b){return a*b/gcd(a,b)}
function bd(){return 60/S.bpm}

// Sound functions
function playKick(t,accent){
  if(!ac||!fx)return;
  try{
    var o=ac.createOscillator();
    var g=ac.createGain();
    o.type='triangle';
    var f=accent?180:140;
    o.frequency.setValueAtTime(f,t);
    o.frequency.exponentialRampToValueAtTime(50,t+(accent?0.18:0.13));
    g.gain.setValueAtTime(accent?0.6:0.4,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+(accent?0.15:0.1));
    o.connect(g);
    g.connect(fx.comp);
    o.start(t);
    o.stop(t+(accent?0.15:0.1));
  }catch(e){}
}

function playBell(t,accent){
  if(!ac||!fx)return;
  try{
    var o=ac.createOscillator();
    var g=ac.createGain();
    o.type='triangle';
    var f=accent?1100:800;
    o.frequency.setValueAtTime(f,t);
    o.frequency.exponentialRampToValueAtTime(f*0.7,t+0.04);
    g.gain.setValueAtTime(accent?0.25:0.15,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    o.connect(g);
    g.connect(fx.comp);
    o.start(t);
    o.stop(t+0.06);
  }catch(e){}
}

// Scheduler
function sched(){
  if(!S.play)return;
  try{
    var now=ac.currentTime;
    if(ntt<now)ntt=now;
    var beat=bd(),ba=S.ba,bb=S.bb,L=lcm(ba,bb),td=beat/(L/4);
    while(ntt<now+0.15){
      if(S.tick%L===0){
        var bs=ntt;
        for(var i=0;i<ba;i++)playKick(bs+i*(beat*4/ba),i===0);
        for(var i=0;i<bb;i++)playBell(bs+i*(beat*4/bb),i===0);
      }
      ntt+=td;S.tick++;
    }
  }catch(e){}
  tid=requestAnimationFrame(sched);
}

// Canvas
var cv=document.getElementById('c');
var cx=cv.getContext('2d');
var W,H;

function resize(){
  W=cv.width=window.innerWidth;
  H=cv.height=window.innerHeight;
}
window.addEventListener('resize',resize);
resize();

function ease(t){return t*t}

function draw(){
  cx.clearRect(0,0,W,H);
  var cx_=W/2,cy=H/2,mr=Math.min(W,H)*0.33,rA=mr*0.65,rB=mr*0.95;
  var ba=S.ba,bb=S.bb;
  
  var bp=0;
  if(S.play&&ac){
    var el=ac.currentTime-pst;
    if(el>0)bp=el%(bd()*4);
  }
  
  var aD=bd()*4/ba,bD=bd()*4/bb;
  var aI=Math.floor(bp/aD)%ba,bI=Math.floor(bp/bD)%bb;
  var aP=(bp%aD)/aD,bP=(bp%bD)/bD;
  
  // Track B - outer
  cx.beginPath();
  cx.arc(cx_,cy,rB,0,Math.PI*2);
  cx.strokeStyle=S.play?'rgba(106,176,200,0.25)':'rgba(106,176,200,0.35)';
  cx.lineWidth=1.5;cx.stroke();
  
  for(var i=0;i<bb;i++){
    var a=-Math.PI/2+i*(Math.PI*2/bb);
    var x=cx_+rB*Math.cos(a),y=cy+rB*Math.sin(a);
    cx.beginPath();cx.arc(x,y,i===bI?5:4,0,Math.PI*2);
    cx.fillStyle=i===bI?'rgba(106,176,200,0.6)':'rgba(106,176,200,0.35)';
    cx.fill();
    if(i===0){cx.beginPath();cx.arc(x,y,7,0,Math.PI*2);cx.fillStyle='rgba(106,176,200,0.7)';cx.fill()}
  }
  
  if(S.play){
    var bE=ease(bP),bA=-Math.PI/2+bI*(Math.PI*2/bb)+bE*(Math.PI*2/bb);
    var bx=cx_+rB*Math.cos(bA),by=cy+rB*Math.sin(bA);
    var g=cx.createRadialGradient(bx,by,0,bx,by,12);
    g.addColorStop(0,'rgba(106,176,200,0.9)');g.addColorStop(0.5,'rgba(106,176,200,0.3)');g.addColorStop(1,'rgba(106,176,200,0)');
    cx.beginPath();cx.arc(bx,by,12,0,Math.PI*2);cx.fillStyle=g;cx.fill();
    cx.beginPath();cx.arc(bx,by,5,0,Math.PI*2);cx.fillStyle='#6ab0c8';cx.fill()
  }
  
  // Track A - inner
  cx.beginPath();
  cx.arc(cx_,cy,rA,0,Math.PI*2);
  cx.strokeStyle=S.play?'rgba(255,138,106,0.25)':'rgba(255,138,106,0.35)';
  cx.lineWidth=1.5;cx.stroke();
  
  for(var i=0;i<ba;i++){
    var a=-Math.PI/2+i*(Math.PI*2/ba);
    var x=cx_+rA*Math.cos(a),y=cy+rA*Math.sin(a);
    cx.beginPath();cx.arc(x,y,i===aI?5:4,0,Math.PI*2);
    cx.fillStyle=i===aI?'rgba(255,138,106,0.6)':'rgba(255,138,106,0.35)';
    cx.fill();
    if(i===0){cx.beginPath();cx.arc(x,y,7,0,Math.PI*2);cx.fillStyle='rgba(255,138,106,0.7)';cx.fill()}
  }
  
  if(S.play){
    var aE=ease(aP),aA=-Math.PI/2+aI*(Math.PI*2/ba)+aE*(Math.PI*2/ba);
    var ax=cx_+rA*Math.cos(aA),ay=cy+rA*Math.sin(aA);
    var g=cx.createRadialGradient(ax,ay,0,ax,ay,16);
    g.addColorStop(0,'rgba(255,138,106,1)');g.addColorStop(0.4,'rgba(255,138,106,0.5)');g.addColorStop(1,'rgba(255,138,106,0)');
    cx.beginPath();cx.arc(ax,ay,16,0,Math.PI*2);cx.fillStyle=g;cx.fill();
    cx.beginPath();cx.arc(ax,ay,6,0,Math.PI*2);cx.fillStyle='#ff8a6a';cx.fill()
  }
  
  // Center text
  cx.fillStyle='#3a3028';
  cx.font='700 14px sans-serif';
  cx.textAlign='center';
  cx.fillText(S.ba+':'+S.bb,cx_,cy+4);
  
  if(!S.play){
    cx.fillStyle='rgba(255,138,106,0.5)';
    cx.font='600 15px sans-serif';
    cx.fillText('点这里',cx_,cy+40);
    var p=0.3+0.2*Math.sin(Date.now()/800);
    cx.beginPath();cx.arc(cx_,cy,mr*0.35,0,Math.PI*2);
    cx.strokeStyle='rgba(255,138,106,'+p+')';
    cx.lineWidth=2;cx.stroke();
  }
  
  requestAnimationFrame(draw);
}

// Controls
function start(){
  initAudio();
  if(!ac){logErr('请先授权音频');return}
  if(ac.state==='suspended')ac.resume();
  S.play=true;S.tick=0;
  ntt=ac.currentTime+0.05;
  pst=ac.currentTime+0.05;
  try{ac.onstatechange=function(){if(ac.state==='suspended'&&S.play)ac.resume()}}catch(e){}
  document.getElementById('btn').textContent='\u25a0';
  document.getElementById('btn').className='s';
  sched();
}

function stop(){
  S.play=false;
  if(tid){cancelAnimationFrame(tid);tid=null}
  S.tick=0;
  document.getElementById('btn').textContent='\u25b6';
  document.getElementById('btn').className='g';
}

function toggle(){S.play?stop():start()}

function setBpm(v){
  S.bpm=Math.max(30,Math.min(300,v));
  document.getElementById('info').innerHTML=S.ba+':'+S.bb+' <span>\u00b7</span> '+S.bpm+' bpm';
}

// Init
function init(){
  try{
    // Play button
    var btn=document.getElementById('btn');
    btn.addEventListener('click',function(e){e.stopPropagation();toggle()});
    
    // Canvas tap
    cv.addEventListener('click',toggle);
    
    // Fullscreen
    var fs=document.getElementById('fs');
    fs.addEventListener('click',function(){
      if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
      }else{
        document.exitFullscreen();
      }
    });
    
    document.addEventListener('fullscreenchange',function(){
      document.getElementById('fs').textContent=document.fullscreenElement?'\u2715':'\u26f2';
    });
    
    // Keyboard
    document.addEventListener('keydown',function(e){
      if(e.code==='Space'){e.preventDefault();toggle()}
      if(e.key==='ArrowUp')setBpm(S.bpm+5);
      if(e.key==='ArrowDown')setBpm(S.bpm-5);
    });
    
    setBpm(80);
    resize();
    draw();
  }catch(e){
    logErr('初始化出错: '+e.message);
  }
}

init();
})();
</script>
</body>
</html>
